name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-legacy-mods:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node (web UI is bundled into core resources)
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Check formatting (Spotless)
        working-directory: mod
        run: ./gradlew spotlessCheck --no-daemon

      - name: Run core tests
        working-directory: mod
        run: ./gradlew :core:test --no-daemon

      - name: Upload core test report on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: core-test-report
          path: mod/core/build/reports/tests/test/
          if-no-files-found: ignore

      - name: Build Fabric 1.19 and 1.21.11 mods
        working-directory: mod
        run: ./gradlew :fabric-1.19:build :fabric-1.21.11:build --no-daemon

      - name: Verify the web UI is bundled in the jars
        working-directory: mod
        run: |
          for jar in fabric-1.19/build/libs/debugbridge-1.19-*[0-9].jar \
                     fabric-1.21.11/build/libs/debugbridge-1.21.11-*[0-9].jar; do
            unzip -p "$jar" 'META-INF/jars/core-*.jar' > /tmp/core-nested.jar
            unzip -l /tmp/core-nested.jar | grep -q 'webui/index.html' \
              || { echo "::error::$jar is missing the bundled web UI"; exit 1; }
            echo "$jar: web UI bundled"
          done

      - name: Upload 1.19 artifact
        uses: actions/upload-artifact@v7
        with:
          name: debugbridge-1.19
          path: mod/fabric-1.19/build/libs/*.jar
          if-no-files-found: error

      - name: Upload 1.21.11 artifact
        uses: actions/upload-artifact@v7
        with:
          name: debugbridge-1.21.11
          path: mod/fabric-1.21.11/build/libs/*.jar
          if-no-files-found: error

  build-26-x:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Node (web UI is bundled into core resources)
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build Fabric 26.x mods
        working-directory: mod
        run: ./gradlew :fabric-26.1:build :fabric-26.2-dev:build --no-daemon

      - name: Verify the web UI is bundled in the jars
        working-directory: mod
        run: |
          for jar in fabric-26.1/build/libs/debugbridge-26.1-*[0-9].jar \
                     fabric-26.2-dev/build/libs/debugbridge-26.2-dev-*[0-9].jar; do
            unzip -p "$jar" 'META-INF/jars/core-*.jar' > /tmp/core-nested.jar
            unzip -l /tmp/core-nested.jar | grep -q 'webui/index.html' \
              || { echo "::error::$jar is missing the bundled web UI"; exit 1; }
            echo "$jar: web UI bundled"
          done

      - name: Upload 26.1 artifact
        uses: actions/upload-artifact@v7
        with:
          name: debugbridge-26.1
          path: mod/fabric-26.1/build/libs/*.jar
          if-no-files-found: error

      - name: Upload 26.2 artifact
        uses: actions/upload-artifact@v7
        with:
          name: debugbridge-26.2-dev
          path: mod/fabric-26.2-dev/build/libs/*.jar
          if-no-files-found: error

  build-web-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-ui/package-lock.json

      - name: Install dependencies
        working-directory: web-ui
        run: npm ci

      - name: Build
        working-directory: web-ui
        run: npm run build

      - name: Upload web UI
        uses: actions/upload-artifact@v7
        with:
          name: web-ui
          path: web-ui/dist/
          if-no-files-found: error
